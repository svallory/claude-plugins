# Technical Docs preset - documentation and reference material
publication:
  media: technical
  audience: expert

writing_style:
  formality: formal

rules:
  punctuation:
    period_quote:
      disabled: true
    oxford_comma:
      disabled: true
    em_dash:
      ai_threshold: 4.0
      human_baseline: 2.0
  structure:
    bullet_density:
      ai_threshold: 8
      human_baseline: 3
    transition_density:
      ai_threshold: 30
      human_baseline: 15
    paragraph_fano_factor:
      ai_threshold: 0.3
      human_baseline: 0.8
  content:
    hedging:
      ai_threshold: 15
      human_baseline: 8
    cliche:
      disabled: true
  vocabulary:
    ai_vocab_density:
      ai_threshold: 20
      human_baseline: 5
