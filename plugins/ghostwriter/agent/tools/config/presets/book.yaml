# Book preset - professional publishing with edited text standards
publication:
  media: book
  audience: general

writing_style:
  formality: formal

rules:
  punctuation:
    period_quote:
      human_baseline: 95
      weight: 0.2
    oxford_comma:
      human_baseline: 90
    em_dash:
      ai_threshold: 4.0
      human_baseline: 2.5
  structure:
    paragraph_fano_factor:
      ai_threshold: 0.3
      human_baseline: 1.8
    bullet_density:
      disabled: true
  vocabulary:
    ai_vocab_density:
      ai_threshold: 10
      human_baseline: 2
  burstiness:
    coefficient_of_variation:
      ai_threshold: 35
      human_baseline: 55
    fano_factor:
      ai_threshold: 0.6
      human_baseline: 2.0
